<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geo-Goal AI · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #050505;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(57,255,20,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    .bg-glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      filter: blur(180px);
      opacity: 0.12;
      pointer-events: none;
    }
    .glow-1 { background: #39FF14; top: -200px; left: -100px; }
    .glow-2 { background: #22c55e; bottom: -200px; right: -100px; }

    .login-wrapper {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px;
      padding: 0 20px;
    }
    .logo-section {
      text-align: center; margin-bottom: 36px;
    }
    .logo-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #39FF14 0%, #22c55e 100%);
      border-radius: 20px;
      margin-bottom: 16px;
      box-shadow: 0 0 40px rgba(57,255,20,0.3);
    }
    .logo-icon svg { width: 32px; height: 32px; }
    .logo-title {
      font-size: 28px; font-weight: 900; color: #fff;
      letter-spacing: -0.5px;
    }
    .logo-title span { color: #39FF14; }
    .logo-sub {
      font-size: 13px; color: #6b7280; margin-top: 6px;
      letter-spacing: 0.3px;
    }
    .card {
      background: rgba(15,15,15,0.95);
      border: 1px solid rgba(57,255,20,0.1);
      border-radius: 20px;
      padding: 36px 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .card h2 {
      font-size: 20px; font-weight: 700; color: #fff;
      margin-bottom: 6px;
    }
    .card p.sub {
      font-size: 13px; color: #6b7280; margin-bottom: 28px;
    }
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block; font-size: 12px; font-weight: 600; color: #9ca3af;
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px;
    }
    .field input {
      width: 100%; padding: 13px 16px;
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: #fff; font-size: 15px; font-family: inherit;
      transition: all 0.2s;
      outline: none;
    }
    .field input:focus {
      border-color: #39FF14;
      box-shadow: 0 0 0 3px rgba(57,255,20,0.1);
    }
    .field input::placeholder { color: #4b5563; }
    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #39FF14 0%, #22c55e 100%);
      color: #000; font-size: 15px; font-weight: 700;
      border: none; border-radius: 12px;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }
    .btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; filter: none; transform: none; }
    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 10px; padding: 12px 16px;
      color: #f87171; font-size: 13px; margin-bottom: 20px;
      display: none;
    }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="login-wrapper">
    <div class="logo-section">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="16,10 8,10 10,6 14,6"/>
          <line x1="12" y1="10" x2="12" y2="18"/>
          <line x1="8" y1="14" x2="16" y2="14"/>
        </svg>
      </div>
      <h1 class="logo-title">Geo<span>Goal</span></h1>
      <p class="logo-sub">AI Analysis Service</p>
    </div>
    <div class="card">
      <h2>Iniciar sesión</h2>
      <p class="sub">Solo administradores autorizados</p>
      <div class="error-msg" id="error"></div>
      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="admin@geogoal.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="password" placeholder="········" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn" id="submitBtn">Ingresar</button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const error = document.getElementById('error');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          error.textContent = data.detail || 'Credenciales inválidas';
          error.style.display = 'block';
        } else {
          window.location.href = '/dashboard';
        }
      } catch (err) {
        error.textContent = 'Error de conexión. ¿El servicio está corriendo?';
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
